<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/mastermind.css">
    <script src="js/template.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/render.js"></script>
    <script src="js/action.js"></script>
    <script src="js/mastermind.js"></script>
  </head>
  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", () => {
      init_game()
    })
  </script>
  <body>
    <div class="game_cont">
      <div class="board">
        <div class="js_mastermind_try_board cont_try_board"></div>
        <div class="mastermind_separator"></div>
        <div class="selector_pins_color">
          <div class="pins_container">
            <div class="pin" data-color="red" onclick="mastermind_select_color(this)"></div>
            <div class="pin" data-color="blue" onclick="mastermind_select_color(this)"></div>
            <div class="pin" data-color="green" onclick="mastermind_select_color(this)"></div>
            <div class="pin" data-color="yellow" onclick="mastermind_select_color(this)"></div>
            <div class="pin" data-color="purple" onclick="mastermind_select_color(this)"></div>
            <div class="pin" data-color="orange" onclick="mastermind_select_color(this)"></div>
          </div>
        </div>
      </div>
      <div>
        <h3 id="feedback_container"></h3>
        <span class="check_button" onclick="mastermind_check_color()">Check</span>
        <span class="delete_button" onclick="mastermind_delete_color()">Delete</span>
        <span class="reset_button" onclick="mastermind_reset_game()">Reset</span>
      </div>
    </div>
  </body>
</html>
